# Configuracao visual e de servidor do Streamlit.
[theme]
base = "dark"
primaryColor = "#1A73E8"             # Google Blue (paleta corporativa)
backgroundColor = "#202124"          # cinza-grafite (superficie base, Material dark)
secondaryBackgroundColor = "#2D2E31" # superficie elevada (cards, sidebar, inputs)
textColor = "#E8EAED"                # texto claro de alto contraste
font = "sans serif"

[server]
maxUploadSize = 200                  # MB — suporta planilhas grandes
